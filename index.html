<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>INTERJAMA · Ticket Oficial de Medición</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="page page-form">

<div class="app-shell">
    <header class="topbar">
        <div>
            <p class="eyebrow">INTERJAMA · Pesaje y Medición de Camiones</p>
            <h1>Ticket Oficial de Medición - Paso Internacional Jama</h1>
        </div>
    </header>

    <main class="card card-form">
        <section class="card-header">
            <h2>Datos del vehículo y pesaje</h2>
            <p>Cargar datos y generar ticket listo para imprimir.</p>
        </section>

        <form id="ticketForm" class="ticket-form">
            <div class="form-grid form-grid-4">
                <div class="form-field">
                    <label for="patente">Patente *</label>
                    <input id="patente" name="patente" type="text" maxlength="20" required />
                </div>

                <div class="form-field">
                    <label for="acoplado">Acoplado</label>
                    <input id="acoplado" name="acoplado" type="text" maxlength="20" />
                </div>

                <div class="form-field">
                    <label for="transportista">Transportista</label>
                    <input id="transportista" name="transportista" type="text" maxlength="120" />
                </div>

                <div class="form-field">
                    <label for="cuit">CUIT</label>
                    <input id="cuit" name="cuit" type="text" maxlength="20" />
                </div>

                <div class="form-field">
                    <label for="chofer">Chofer</label>
                    <input id="chofer" name="chofer" type="text" maxlength="120" />
                </div>

                <div class="form-field">
                    <label for="dni">DNI</label>
                    <input id="dni" name="dni" type="text" maxlength="20" />
                </div>

                <div class="form-field">
                    <label for="largoMetros">Largo (metros) Camión</label>
                    <input id="largoMetros" name="largoMetros" type="number" step="0.01" min="0" required />
                </div>

                <div class="form-field">
                    <label for="anchoMetros">Ancho (metros) Camión</label>
                    <input id="anchoMetros" name="anchoMetros" type="number" step="0.01" min="0" required />
                </div>

                <div class="form-field">
                    <label for="altoMetros">Alto (metros) Camión</label>
                    <input id="altoMetros" name="altoMetros" type="number" step="0.01" min="0" required />
                </div>
            </div>

            <section class="subsection-block">
                <div class="subsection-header">
                    <h3>Pesaje en báscula</h3>
                    <p>Tres campos: tara, camión lleno y peso real de la mercadería.</p>
                </div>

                <div class="form-grid form-grid-3">
                    <div class="form-field">
                        <label for="taraKg">Tara (kg)</label>
                        <input id="taraKg" name="taraKg" type="number" step="0.01" min="0" />
                    </div>

                    <div class="form-field">
                        <label for="brutoKg">Camión lleno de mercadería (kg)</label>
                        <input id="brutoKg" name="brutoKg" type="number" step="0.01" min="0" />
                    </div>

                    <div class="form-field">
                        <label for="mercaderiaKg">Peso real de la mercadería (kg)</label>
                        <input id="mercaderiaKg" name="mercaderiaKg" type="number" step="0.01" min="0" readonly />
                    </div>
                </div>
            </section>

            <div class="form-field form-field-full">
                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" name="observaciones" rows="4" maxlength="500"></textarea>
            </div>

            <div class="form-actions">
                <button id="submitButton" type="button" class="primary-button">
                    Generar ticket para imprimir
                </button>
                <button id="resetButton" type="reset" class="ghost-button">
                    Limpiar
                </button>
            </div>

            <div id="formMessage" class="form-message" aria-live="polite"></div>
        </form>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
