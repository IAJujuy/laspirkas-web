<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CAP · Ticket de Medición</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body class="page page-form">

<div class="app-shell">
    <header class="topbar">
        <div>
            <p class="eyebrow">INTERJAMA · Medición de camiones</p>
            <h1>Nuevo ticket de medición</h1>
        </div>
        <div class="topbar-actions">
            <a href="/h2-console" target="_blank" class="secondary-link">H2 Console</a>
        </div>
    </header>

    <main class="card card-form">
        <section class="card-header">
            <h2>Datos del vehículo</h2>
            <p>Cargar medición y generar ticket imprimible.</p>
        </section>

        <form id="ticketForm" class="ticket-form">
            <div class="form-grid">
                <div class="form-field">
                    <label for="patente">Patente *</label>
                    <input id="patente" name="patente" type="text" maxlength="20" required />
                </div>

                <div class="form-field">
                    <label for="acoplado">Acoplado</label>
                    <input id="acoplado" name="acoplado" type="text" maxlength="20" />
                </div>

                <div class="form-field">
                    <label for="transportista">Transportista</label>
                    <input id="transportista" name="transportista" type="text" maxlength="120" />
                </div>

                <div class="form-field">
                    <label for="chofer">Chofer</label>
                    <input id="chofer" name="chofer" type="text" maxlength="120" />
                </div>

                <div class="form-field">
                    <label for="largoMetros">Largo (m) *</label>
                    <input id="largoMetros" name="largoMetros" type="number" step="0.01" min="0" required />
                </div>

                <div class="form-field">
                    <label for="anchoMetros">Ancho (m) *</label>
                    <input id="anchoMetros" name="anchoMetros" type="number" step="0.01" min="0" required />
                </div>

                <div class="form-field">
                    <label for="altoMetros">Alto (m) *</label>
                    <input id="altoMetros" name="altoMetros" type="number" step="0.01" min="0" required />
                </div>
            </div>

            <div class="form-field form-field-full">
                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" name="observaciones" rows="4" maxlength="500"></textarea>
            </div>

            <div class="form-actions">
                <button id="submitButton" type="submit" class="primary-button">
                    Guardar y generar ticket
                </button>
                <button id="resetButton" type="reset" class="ghost-button">
                    Limpiar
                </button>
            </div>

            <div id="formMessage" class="form-message" aria-live="polite"></div>
        </form>
    </main>
</div>

<script src="/app.js"></script>
</body>
</html>
